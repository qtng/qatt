<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki & News Transliteration</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://qtng.github.io/qatt-dc/js/parser.js"></script>
    <script src="https://qtng.github.io/qatt-dc/js/renderer.js"></script>

    <style>
        .wiki-content img, .news-item img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            margin-bottom: 1.25rem;
            display: block;
            background-color: #f8f9fa;
        }
    
    svg {
        height: 1.6em;
        fill: transparent;
        stroke: currentColor;
        stroke-width: 5.5px;
        stroke-linecap: square;
        stroke-linejoin: square;
    }
    a svg {
        border-bottom: 1.5px solid currentColor
    }
        
        /* Ruby & Transliteration Design */
        ruby {
            display: inline-flex;
            flex-direction: column-reverse; 
            align-items: center;
            vertical-align: bottom;
            white-space: nowrap;
            margin: 0 1px;
            xcolor: #212529;
            font-weight: inherit;
        }

        ruby rt {
            display: block;
            font-size: 1.1em;
            line-height: 1.2;
            xfont-family: sans-serif;
            xfont-weight: inherit;normal;
            text-align: center;
            xcolor: #6c757d;
        }

        ruby.ruby-changed rt {
            xcolor: #0d6efd; 
            font-weight: 500;
        }

        /* Flow-Modus: Wenn das Original ausgeblendet ist */
        .hide-original ruby {
            display: inline;
            white-space: normal;
            margin: 0;
            color: inherit;
        }
        .hide-original .r-base { display: none; }
        .hide-original ruby rt {
            display: inline;
            font-size: 1.1em;
            color: inherit;
            line-height: inherit;
        }
        .hide-original ruby.ruby-changed rt {
            color: inherit; 
            font-weight: inherit;
        }

        /* News Layout */
        .news-item { 
            border-bottom: 1px solid #eee; 
            padding: 2rem 0; 
        }
        .news-item:last-child { border-bottom: none; }

        .sticky-header {
            background: white;
            z-index: 1020;
            padding-top: 1rem;
        }

        /* Klassisches Tab-Styling */
        .nav-tabs {
            border-bottom: 1px solid #dee2e6;
        }
        .nav-tabs .nav-link {
            border: 1px solid transparent;
            border-bottom: none;
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
            padding: 0.6rem 1.5rem;
            margin-bottom: -1px; 
            color: #6c757d;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-tabs .nav-link:hover {
            background-color: #f8f9fa;
            border-color: #dee2e6 #dee2e6 transparent;
        }
        .nav-tabs .nav-link.active {
            color: #0d6efd;
            background-color: #fff;
            border-color: #dee2e6 #dee2e6 #fff; 
            position: relative;
        }

        /* Inhalts-Container */
        .tab-content-container {
            border: 1px solid #dee2e6;
            border-top: none; 
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
            background-color: #fff;
        }

        /* Link zum Originalartikel mit Feinjustierung nach oben */
        .external-wiki-link {
            color: #6c757d;
            text-decoration: none;
            transition: color 0.2s;
            line-height: 1;
            position: relative;
            top: -0.1em;
        }
        .external-wiki-link:hover {
            color: #0d6efd;
        }

        /* Ausrichtung der Überschriften-Zeile */
        .wiki-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 1.5rem;
        }
        .svg-bold svg {
        	   stroke-width: 9.5px;
        }
    </style>
</head>
<body class="bg-light">

    <header class="sticky-header sticky-top">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="fw-bold text-primary fs-4"><tt class="svg-bold">v,i</tt><tt class="text-danger">c,i</tt><tt class="text-success svg-bold">b,e</tt><tt class="text-warning">d,i</tt><tt class="text-info svg-bold">_,a</tt></span>
                <div class="d-flex align-items-center gap-3">
                    <div id="showToggleContainer" class="form-check form-switch small m-0 d-none">
                        <input class="form-check-input" type="checkbox" role="switch" id="showOriginalToggle">
                        <label class="form-check-label" for="showOriginalToggle">
                            Quốc ngữ
                        </label>
                    </div>
                    <div class="form-check form-switch small m-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="transToggle">
                        <label checked class="form-check-label" for="transToggle">
                            Quốc Âm
                        </label>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center mb-4 pt-3 bg-light">
                <div class="col-md-8 col-lg-6">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Tìm kiếm...">
                        <button id="searchBtn" class="btn btn-primary px-4" type="button">
                            <tt class="svg-bold">t,i,m,2</tt>
                        </button>
                    </div>
                </div>
            </div>

            <div class="d-none row justify-content-center">
                <div class="col-lg-10">
                    <ul class="nav nav-tabs justify-content-start" id="modeTabs">
                        <li class="nav-item">
                            <button class="nav-link active" data-mode="wiki" type="button">
                                <i class="bi bi-book me-2"></i>Wikipedia
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-mode="news" type="button">
                                <i class="bi bi-newspaper me-2"></i>News
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-12">
                <div class="p-3 tab-content-container border shadow-sm">
                    <div id="loading" class="text-center d-none py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                    <div id="errorMessage" class="alert alert-danger d-none border-0" role="alert"></div>

                    <div id="wikiArea">
                        <div class="wiki-header-row">
                            <h1 id="wikiTitle" class="display-6 fw-bold mb-3"></h1>
                            <a id="wikiExternalLink" href="#" target="_blank" class="external-wiki-link mt-2" title="Mở trong Wikipedia">
                                <i class="bi bi-box-arrow-up-right fs-4"></i>
                            </a>
                        </div>
                        <div id="contentArea" class="wiki-content"></div>
                    </div>

                    <div id="newsArea" class="d-none">
                        <h2 class="h4 fw-bold mb-4"><i class="bi bi-lightning-fill text-warning me-1"></i> Tin tức Việt Nam</h2>
                        <div id="newsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const parser = new VietnameseParser();
        const renderer = new SvgGlyphRenderer({
            container: document.createElement("div")
        });
        // renderer.updateConfig(0)
    
        // --- Konfiguration ---
        const GNEWS_API_KEY = '';
        const START_TERM = "Quốc Âm Tân Tự"; // Aktualisierter Start-Begriff
        const wikiLang = "vi";
        
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const contentArea = document.getElementById('contentArea');
        const newsList = document.getElementById('newsList');
        const wikiTitle = document.getElementById('wikiTitle');
        const wikiExternalLink = document.getElementById('wikiExternalLink');
        const transToggle = document.getElementById('transToggle');
        const showOriginalToggle = document.getElementById('showOriginalToggle');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const tabButtons = document.querySelectorAll('#modeTabs .nav-link');

        let currentWikiHtml = ""; 
        let currentNewsData = [];
        let originalTitle = "";
        let currentMode = "wiki";

        function transliterateWord(word) {
            const parsed = parser.parse(word.trim());
            if (parsed) {
                const type = 0;
                let code = parsed.code;
                if (!type) code = code.replace(',', ',+').replace('0', '');
                const div = document.createElement("div")
                renderer.renderText(code, div, type);
                return div.innerHTML;
            }
            return word;
        }

        function textToRubyHTML(text) {
            if (!text) return "";
            return text.replace(/\s*[abcdeghiklmnopqrstuvxyàáạảãÂâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđĐ]+\s*/ig, (word) => {
                const trans = transliterateWord(word);
                const isChanged = trans !== word;
                return `<ruby class="${isChanged ? 'ruby-changed' : 'ruby-same'}"><span class="r-base">${word}</span><rt>${trans}</rt></ruby>`;
            });
        }

        async function fetchNews(query = "") {
            setLoading(true);
            const topic = query || "tin tức Việt Nam";
            const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(topic)}&lang=vi&country=vn&max=10&apikey=${GNEWS_API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.errors) throw new Error(data.errors[0]);
                currentNewsData = data.articles || [];
                renderNews();
                switchContent('news');
            } catch (err) { showError(err.message); }
            finally { setLoading(false); }
        }

        function renderNews() {
            newsList.innerHTML = currentNewsData.map(art => `
                <div class="news-item">
                    <h3 class="h5 fw-bold mb-2">${art.title}</h3>
                    <div class="mb-3 text-muted small d-flex gap-3">
                        <span><i class="bi bi-calendar3 me-1"></i>${new Date(art.publishedAt).toLocaleDateString('vi-VN')}</span>
                        <span><i class="bi bi-journal-text me-1"></i>${art.source.name}</span>
                    </div>
                    ${art.image ? `<img src="${art.image}" class="img-fluid" onerror="this.style.display='none'">` : ''}
                    <p class="news-desc lh-base">${art.description}</p>
                    <a href="${art.url}" target="_blank" class="btn btn-sm btn-link p-0 text-decoration-none fw-bold">Xem bài gốc <i class="bi bi-arrow-right"></i></a>
                </div>
            `).join('');
            if (transToggle.checked) applyRuby(newsList);
            updateHiding();
        }

        async function fetchWiki(title) {
            setLoading(true);
            const url = `https://${wikiLang}.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&format=json&origin=*&prop=text|displaytitle`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.error) throw new Error("Nicht gefunden.");
                originalTitle = data.parse.title;
                currentWikiHtml = data.parse.text["*"];
                renderWiki();
                switchContent('wiki');
            } catch (err) { showError(err.message); }
            finally { setLoading(false); }
        }

        function renderWiki() {
            wikiTitle.innerHTML = originalTitle;
            wikiExternalLink.href = `https://${wikiLang}.wikipedia.org/wiki/${encodeURIComponent(originalTitle.replace(/ /g, '_'))}`;
            
            let html = currentWikiHtml.replace(/src="\/\//g, 'src="https://').replace(/srcset="\/\//g, 'srcset="https://');
            html = html.replace(/src="\/([^/])/g, `src="https://${wikiLang}.wikipedia.org/$1`);
            contentArea.innerHTML = html;
            if (transToggle.checked) {
                applyRuby(contentArea);
                wikiTitle.innerHTML = textToRubyHTML(originalTitle);
            }
            updateHiding();
        }

        function applyRuby(container) {
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
                acceptNode: n => {
                    const parentTag = n.parentElement.tagName.toLowerCase();
                    return ['script', 'style', 'ruby', 'rt', 'code', 'pre'].includes(parentTag) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
                }
            });
            const nodes = [];
            let n; while (n = walker.nextNode()) if (n.nodeValue.trim()) nodes.push(n);
            nodes.forEach(textNode => {
                const rubyHTML = textToRubyHTML(textNode.nodeValue);
                if (rubyHTML !== textNode.nodeValue) {
                    const span = document.createElement('span');
                    span.innerHTML = rubyHTML;
                    textNode.parentNode.replaceChild(span, textNode);
                }
            });
        }

        function updateHiding() {
            const hide = !showOriginalToggle.checked && transToggle.checked;
            [contentArea, wikiTitle, newsList].forEach(c => c?.classList.toggle('hide-original', hide));
        }

        function switchContent(mode) {
            currentMode = mode;
            document.getElementById('wikiArea').classList.toggle('d-none', mode !== 'wiki');
            document.getElementById('newsArea').classList.toggle('d-none', mode !== 'news');
            tabButtons.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-mode') === mode));
        }

        function setLoading(isLoading) {
            loading.classList.toggle('d-none', !isLoading);
            if(isLoading) {
                document.getElementById('wikiArea').classList.add('d-none');
                document.getElementById('newsArea').classList.add('d-none');
                errorMessage.classList.add('d-none');
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('d-none');
        }

        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.getAttribute('data-mode');
                const query = searchInput.value.trim();
                if (mode === 'news') {
                    if (currentNewsData.length === 0 || (query && query !== START_TERM)) fetchNews(query && query !== START_TERM ? query : "");
                    else switchContent('news');
                } else {
                    if (!originalTitle || (query && query !== originalTitle)) fetchWiki(query || START_TERM);
                    else switchContent('wiki');
                }
            });
        });

        searchBtn.addEventListener('click', () => {
            const val = searchInput.value.trim();
            if (!val) return;
            currentMode === 'wiki' ? fetchWiki(val) : fetchNews(val);
        });

        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });

        transToggle.addEventListener('change', () => {
            showToggleContainer.classList.toggle('d-none', !transToggle.checked);
            currentMode === 'wiki' ? renderWiki() : renderNews();
        });

        showOriginalToggle.addEventListener('change', updateHiding);

        // --- Link-Interceptor für Wikipedia-Navigation ---
        contentArea.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (link) {
                const href = link.getAttribute('href');
                if (href) {
                    const isWikiInternal = href.startsWith('/wiki/') || href.includes('.wikipedia.org/wiki/');
                    if (isWikiInternal && !href.includes(':')) {
                        e.preventDefault();
                        const titlePart = href.split('/wiki/')[1].split('#')[0];
                        const decodedTitle = decodeURIComponent(titlePart).replace(/_/g, ' ');
                        searchInput.value = decodedTitle;
                        fetchWiki(decodedTitle);
                        window.scrollTo(0, 0);
                    }
                }
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            Array.from(document.querySelectorAll("tt")).forEach(el => {
              const t = el.innerText;
              const type = Number(el.dataset.type || 0);
              el.innerHTML = "";
              el.dataset.codes = t;
              renderer.renderText(t,el,type);
              //chars.push(el);
            });
            searchInput.value = START_TERM;
            fetchWiki(START_TERM);
        });
    </script>
</body>
</html>
