<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Học QATT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://qtng.github.io/qatt-dc/js/navigation.js"></script>
  <script src="https://qtng.github.io/qatt-dc/js/renderer.js"></script>
  <script src="https://qtng.github.io/qatt-dc/js/parser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://qtng.github.io/qatt-dc/js/supabase.js"></script>
  
  <style>
    :root {
      --stroke-width: 7px;
      --highlight-onsets: #f87171;
      --highlight-vowels: #60a5fa;
      --highlight-tones: #4ade80;
      --highlight-rhymes: #60a5fa;
      --highlight-codas: #c084fc;
      --nav-height: 55px;
      --external-nav-height: 55px;
    }

    body {
      background: #3a445c;
      min-height: 100vh;
      color: white;
      padding-top: calc(var(--external-nav-height) + var(--nav-height) + 15px);
      padding-bottom: 100px; 
    }
    
    html { scroll-behavior: auto !important; }
    
    .fixed-header-container {
      position: fixed;
      top: var(--external-nav-height);
      left: 0;
      width: 100%;
      height: var(--nav-height);
      background: rgba(58, 68, 92, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .nav-icon-btn {
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      margin-left: 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .nav-icon-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.1); }

    svg {
        stroke: currentColor;
        stroke-width: var(--stroke-width);
        stroke-linecap: square;
        stroke-linejoin: square;
        fill: transparent;
        overflow: visible !important;
        display: inline-block;
        max-width: 100%;
        height: 2.75em;
    }
    
    svg use[href^="#qt"] { stroke-width: calc(var(--stroke-width) * 3 / 4) }

    .card { color: inherit; background-color: #46516d; border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .lesson-card { transition: transform 0.2s; cursor: pointer; }
    .lesson-card:hover { transform: translateY(-3px); filter: brightness(1.05); }

    .reference-svg-container { display: inline-block; margin-left: 1em; opacity: 0.3; vertical-align: middle; }
    .reference-svg-container svg { height: 1.8em!important; --stroke-width: 8px; }

    .status-group { display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; flex-grow: 1; margin-left: 10px; overflow-x: auto; scrollbar-width: none; }

    .score-badge {
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 8px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      white-space: nowrap;
    }
    .score-badge.pop { transform: scale(1.15); background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.3); }
    
    .badge-total { background: rgba(74, 222, 128, 0.15); border-color: rgba(74, 222, 128, 0.3); font-size: 0.85rem; padding: 4px 10px; }

    .symbol-card, .word-grid-item, .lesson-thumbnail {
        position: relative;
        background: #3a445c;
        border-radius: 6px;
        padding: 4px;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        min-width: 85px;
        height: 85px;
        color: #fff;
        box-shadow: 2px 2px 40px rgb(255 255 255 / .025);
    }

    .symbol-card { min-height: 220px; border-radius: 18px; padding: 30px; svg { height: 6em; margin-top: -1.75em; }; }
    .reload-quiz-btn { position: absolute; top: 15px; left: 15px; background: none; border: none; color: white; opacity: 0.3; font-size: 1.4rem; padding: 10px; z-index: 10; }

    .qatt-container { max-width: 550px; margin: auto; margin-top: var(--external-nav-height); padding: 0 15px; }
    .category-title { font-weight: 800; text-transform: uppercase; margin-top: 2rem; margin-bottom: 1rem; font-size: 0.8rem; opacity: 0.5; }
    .progress { background-color: rgba(255,255,255,0.1); border-radius: 10px; height: 6px !important; }
    
    .style-selector-wrap { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 10px; margin-left: 5px; margin-right: 15px; }
    #global-style-select { background: transparent; border: none; color: white; font-size: 0.75rem; font-weight: bold; cursor: pointer; outline: none; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .options .btn { 
      min-height: 90px; 
      transition: all 0.2s ease; 
      background-color: rgba(255, 255, 255, .85); 
      color: #1a1a1a; 
      font-weight: 800; 
      font-size: 1.65rem; 
      border-radius: 16px; 
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border: 4px solid transparent;
    }
    .options .btn svg { height: 2.2em; }

    .hint-shake { animation: hintShake 0.15s ease-in-out infinite; box-shadow: 0 0 15px rgba(74, 222, 128, 0.6) !important; }
    @keyframes hintShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }

    .feedback-area { position: absolute; top: 50%; left: 50%; width: 100%; text-align: center; z-index: 100; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.6); }
    .float-up-fade { animation: floatUpFade 1.6s ease-in-out forwards; }
    @keyframes floatUpFade { 0% { opacity: 0; transform: translate(-50%, -30%); } 15%, 85% { opacity: 1; transform: translate(-50%, -50%); } 100% { opacity: 0; transform: translate(-50%, -70%); } }

    .energy-heart { 
      position: relative;
      color: #f87171; 
      font-size: 0.9rem; 
      margin-left: 1px; 
      display: inline-block;
    }
    .energy-heart.lost { opacity: 0.2; filter: grayscale(1); }
    
    .heart-fly-loss {
      position: absolute;
      pointer-events: none;
      color: #f87171;
      font-size: 1rem;
      z-index: 2100;
      animation: heartFlyAway 1s ease-out forwards;
    }

    @keyframes heartFlyAway {
      0% { transform: scale(1) translateY(0); opacity: 1; }
      100% { transform: scale(2.5) translateY(-2.5em); opacity: 0; }
    }

    .word-progress-emoji { position: absolute; font-size: 1.4rem; pointer-events: none; }
    .quiz-pos { top: 10px; right: 10px; }
    .grid-pos { bottom: 4px; right: 4px; font-size: 0.9rem; }

    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

    .fixed-bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 550px; background: linear-gradient(to top, #3a445c 85%, transparent); padding: 30px 15px 25px 15px; z-index: 2000; display: none; pointer-events: none; }
    .fixed-bottom-bar .btn { pointer-events: auto; }

    .symbol-animate {
      display: inline-block;
      animation: symbolPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .sunflower-milestone {
      display: inline-block;
      animation: sunflowerMegaPop 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      filter: drop-shadow(0 0 15px #fde047);
      z-index: 10;
    }

    @keyframes symbolPop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.4); }
      100% { transform: scale(1.2); opacity: 1; }
    }

    @keyframes sunflowerMegaPop {
      0% { transform: scale(0) rotate(-90deg); opacity: 0; }
      30% { transform: scale(4.5) rotate(20deg); opacity: 1; }
      60% { transform: scale(1.3) rotate(-10deg); }
      100% { transform: scale(1.5) rotate(0deg); opacity: 1; }
    }

    .plus-one-heart {
      display: block;
      font-weight: 900;
      color: #f87171;
      font-size: 2.2rem;
      margin-top: 5px;
      animation: heartPopEffect 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes heartPopEffect {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
  
  /* Count down timer */
  @property --p {initial-value:0; syntax: '<number>'; inherits: false}
  @property --timer-color {initial-value: gray; syntax: '<color>'; inherits: false}
  .timer-wrapper { width: 20px; height: 20px; transform: scaleX(1); display: inline-block }
  .timer-pie {
    width: 100%; height: 100%; border-radius: 50%;
    background:  conic-gradient(transparent calc(var(--p) * 1%), var(--timer-color) 0),
      rgba(255, 255, 255, 0.1); 
  }
  /* 10 seconds infinite loop animation */
  .timer-active { animation: countdown-logic 10s linear infinite }
  @keyframes countdown-logic {
    0% {--p: 0; --timer-color: khaki}
    50% {--timer-color: khaki}
    100% {--p: 100; --timer-color: #f06}
  }

    /* !!! START OF PROTECTED CSS BLOCK !!! */
    .lesson-onsets :not(.reference-svg-container) > nobr > svg {
    	use[href$="small"], use[href$="large"] { stroke: var(--highlight-onsets) }
    }
    .lesson-vowels :not(.reference-svg-container) > nobr > svg {
    	use[href$="a"], use[href$="#e"], use[href$="-e"], use[href$="i"], use[href$="o"], use[href$="u"], use[href$="y"], use[href$="w"], use[href$="2"] { stroke: var(--highlight-vowels) }
    }
	.lesson-tones :not(.reference-svg-container) > nobr > svg {
    	use[href^="#qt"], use[href*="tlarge"] { stroke: var(--highlight-tones) }
    }
    .lesson-codas :not(.reference-svg-container) > nobr > svg {
    	use[href$="U"], use[href$="I"], use[href$="N"], use[href$="M"], use[href$="NG"], use[href$="NH"], use[href$="T"], use[href$="P"], use[href$="C"], use[href$="CH"] { stroke: var(--highlight-codas) }
    }
    .lesson-rhymes-1, .lesson-rhymes-2, .lesson-rhymes-3, .lesson-rhymes-4, .lesson-rhymes-5, .lesson-rhymes-6, .lesson-rhymes-7, .lesson-rhymes-8, .lesson-rhymes-9, .lesson-rhymes-10, .lesson-rhymes-11 {
    	:not(.reference-svg-container) > nobr > svg {
    		use[href$="-_"], use[href$="-b"], use[href$="-c"], use[href$="-ch"], use[href$="-d"], use[href$="-dz"], use[href$="-g"], use[href$="-h"], use[href$="-kh"], use[href$="-l"], use[href$="-m"], use[href$="-n"], use[href$="-ng"], use[href$="-nh"], use[href$="-ph"], use[href$="-r"], use[href$="-s"], use[href$="-t"], use[href$="-th"], use[href$="-tr"], use[href$="-v"], use[href$="-x"] { stroke: var(--highlight-rhymes); };
    		use[href*="-_"], use[href*="-b"], use[href*="-c"], use[href*="-ch"], use[href*="-d"], use[href*="-dz"], use[href*="-g"], use[href*="-h"], use[href*="-kh"], use[href*="-l"], use[href*="-m"], use[href*="-n"], use[href$="-ng"], use[href*="-nh"], use[href*="-ph"], use[href*="-r"], use[href*="-s"], use[href*="-t"], use[href*="-th"], use[href*="-tr"], use[href*="-v"], use[href*="-x"] {
    			&[href$="1"], &[href$="2"], &[href$="3"], &[href$="4"], &[href$="5"], &[href$="6"]{ stroke: var(--highlight-rhymes); };
    		};
    	}
	}
    /* !!! END OF PROTECTED CSS BLOCK !!! */
  </style>
</head>
<body data-bs-theme="dark">
  
  <header class="fixed-header-container">
    <div class="d-flex align-items-center w-100">
      <div class="nav-icon-btn" onclick="app.renderLibrary()" title="Trang chủ">🏠</div>

      <div class="status-group">
        <div id="badge-total" class="score-badge badge-total" title="Tổng điểm">🏆 <span id="val-total">0</span></div>
        <div id="badge-sunflower" class="score-badge badge-sunflower" title="Hoa">🌻 <span id="val-sunflower">0</span></div>
        <div id="badge-plant" class="score-badge badge-plant" title="Cây">🌱 <span id="val-plant">0</span></div>
      </div>
      
      <div class="style-selector-wrap">
        <select id="global-style-select">
          <option selected value="-1">Chính thể</option>
          <option value="1">Giản thể</option>
        </select>
      </div>
    </div>
  </header>

  <div class="container qatt-container">
    <div id="app"></div>
  </div>

  <div id="fixed-bottom-controls" class="fixed-bottom-bar">
    <div class="d-grid">
      <button id="main-action-btn"
        class="btn btn-info btn-lg shadow-lg fw-bold py-3"
        onclick="app.startLessonDirectly()">
        Bắt đầu tặp
      </button>
    </div>
  </div>

  <script>
class App {
  constructor(container, db) {
    this.opts = { 
      requiredCorrect: 3, 
      maxErrors: 3, 
      learningWindow: 4, 
      hintDelay: 10000 
    };
    this.db = db;
    this.useDB = true;
    this.username = localStorage.username || "Anonymous";
    this.mainContainer = container;
    this.lessons = {};
    this.currentLesson = null;
    this.globalStyle = localStorage.getItem('qattType') || "-1";
    this.maxEnergy = 5; 
    this.currentEnergy = 5;
    this.parser = new VietnameseParser();
    this.renderer = new SvgGlyphRenderer({});
    this.stats = JSON.parse(localStorage.getItem('qatt_stats')) || { _score: 0 };
    this.hintInterval = null;
    this.activeQuizWord = null;
    this.lastQuizWord = null; 
    this.categories = [];
    this.bottomBar = document.getElementById("fixed-bottom-controls");
    
    this.setupStyleSelector();
    this.setupAudio();
    this.setupNavigation();
    this.updateGlobalCounters();
  }
  
  static async init(container) {
    const db = new SupabaseService();
    await db.init();
    //db.signInWithGoogle()
    const int = setInterval(() => {
    	if (db.user) {
    		clearInterval(int);
    	}
    }, 500);
  	return new App(container, db);
  }
  
  refreshCurrentView(state = null) {
    const currentState = state || history.state || { view: 'library' };
    const view = currentState.view || 'library';
    
    if (view === 'library') this.renderLibrary(true);
    else if (view === 'preview') this.renderLessonPreview(currentState.lessonId, true);
    else if (view === 'quiz') this.renderQuiz(true);
    else if (view === 'full') this.renderFullView(true);
    else if (view === 'leaderboard') this.renderLeaderboard(true);
  }

  // --- VIEWS ---
  renderLibrary(isPop = false) {
    if (!isPop) history.pushState({ view: 'library' }, '');
    this.currentLesson = null;
    this.bottomBar.style.display = "none";
    this.clearHintTimer();

    let html = "";
    
    if (this.useDB) html += `
      <div class="fade-in alert py-0 shadow">
       		<div class="text-center mb-3">
		         <div class="me-2 btn btn-sm btn-outline-warning" onclick="app.renderLeaderboard()">Bảng xếp hạng</div>
         		<button class="btn btn-sm btn-outline-light" onclick="app.renderFullView()">
           			Mục lục
         		</button>
        </div>
      	</div>
        `;

    this.categories.forEach(category => {
      html += `
        <div class="category-title">${category}</div>
        <div class="row g-3">`;

      Object.values(this.lessons)
        .filter(lesson => lesson.category === category)
        .forEach(lesson => {
          const progress = this.getLessonProgress(lesson.id);
          html += `
            <div class="col-12 lesson-${lesson.id}">
              <div class="card p-3 lesson-card" onclick="app.renderLessonPreview('${lesson.id}')">
                <div class="d-flex justify-content-between align-items-center">
                  <div class="flex-grow-1 me-3">
                    <h5 class="fw-bold mb-1">${lesson.name}</h5>
                    
                    <small class="opacity-50 mt-1 d-block">${lesson.symbols.length} chữ</small>
                  </div>
                  <div class="d-flex flex-column align-items-stretch">
                  <div id="thumb-${lesson.id}" class="lesson-thumbnail"></div>
                  <div class="progress mt-1">
                    <div class="progress-bar bg-info" role="progressbar" style="width: ${progress}%;" aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  </div>
                </div>
              </div>
            </div>`;
        });
      html += `
      	</div>`;
    });

    this.mainContainer.innerHTML = html + `</div>`;

    Object.values(this.lessons).forEach(lesson => { 
      const thumbElement = document.getElementById(`thumb-${lesson.id}`);
      if (thumbElement) {
        this.renderToElement(lesson.symbols[0], this.getActiveStyle(lesson), thumbElement, true); 
      }
    });

    this.updateGlobalCounters();
  }

  renderLessonPreview(lessonId, isPop = false) {
    history[isPop?'replaceState':'pushState']({ view: 'preview', lessonId: lessonId }, '');
    this.currentLesson = this.lessons[lessonId];
    this.bottomBar.style.display = "block";

    const lessonClass = `lesson-${lessonId}`;
    this.mainContainer.innerHTML = `
      <div class="fade-in ${lessonClass}">
        <button onclick="app.renderLibrary()" class="btn btn-link text-white-50 text-decoration-none mb-2 p-0">
          ← Quay lại
        </button>
        <div class="card p-4 preview-container">
          <div class="mb-4">
            <h3 class="fw-bold">${this.currentLesson.name}</h3>
            <div class="progress">
              <div class="progress-bar bg-info"></div>
            </div>
          </div>
          <div class="row g-3" id="words-grid"></div>
        </div>
      </div>`;

    this.renderStatus(document.querySelector(".preview-container"));
    
    const activeStyle = this.getActiveStyle(this.currentLesson);
    const gridElement = document.getElementById("words-grid");

    this.currentLesson.symbols.forEach(word => {
        const column = document.createElement("div"); 
        column.className = "col-6 col-sm-4";
        
        const card = document.createElement("div"); 
        card.className = "word-grid-item";
        
        if (this.stats[word].c >= 3) {
          card.style.borderColor = "rgba(74, 222, 128, 0.4)";
        }

        this.renderToElement(word, activeStyle, card);
        card.innerHTML += this.getProgressEmoji(word, false, 'grid');
        gridElement.appendChild(column).appendChild(card);
    });
  }


  renderQuiz(isPop = false, keepWord = false) {
    if (this.currentEnergy <= 0) {
      this.mainContainer.innerHTML = `
        <div class="card p-5 text-center">
          <h2>Hết năng lượng!</h2>
          <button class="btn btn-primary mt-3" onclick="app.startLessonDirectly()"> Thử lại </button>
        </div>`;
      return;
    }
    	if (!this.currentLesson) return;
    let unfinishedSymbols = this.currentLesson.symbols.filter(symbol => this.stats[symbol].c < 3);
    if (unfinishedSymbols.length === 0) {
      if ((this.currentLesson.practiceModeItems||[]).length == 0) {
        this.renderLessonPreview(this.currentLesson.id, true);
        return;
      }
      else unfinishedSymbols = this.currentLesson.practiceModeItems;
    }

    if (!isPop) history.pushState({ view: 'quiz' }, '');
    this.bottomBar.style.display = "none";
    
    if (!keepWord) {
      const poolLimit = Math.min(unfinishedSymbols.length, this.opts.learningWindow);
      let selectedWord;
      
      if (unfinishedSymbols.length > 1) {
        let tries = 0;
        do {
          tries++;
          selectedWord = unfinishedSymbols[Math.floor(Math.random() * poolLimit)];
        } while (tries < 20 && selectedWord === this.lastQuizWord);
      } else {
        selectedWord = unfinishedSymbols[0];
      }
      
      this.activeQuizWord = selectedWord;
      this.lastQuizWord = selectedWord;
	}
	  
    const correctWord = this.activeQuizWord;
    const showSvgAsQuestion = Math.random() < 0.5;
    const activeStyle = this.getActiveStyle(this.currentLesson);
    const lessonClass = `lesson-${this.currentLesson.id}`;

    this.mainContainer.innerHTML = `
      <div class="fade-in ${lessonClass}">
        <button onclick="app.renderLibrary()" class="btn btn-link text-white-50 text-decoration-none mb-2 p-0">
          ← Quay lại
        </button>
        <div class="card p-4 quiz-container">
          <div class="d-flex justify-content-between mb-1">
            <h5 class="fw-bold opacity-50">${this.currentLesson.name}</h5>
            
            <div class="energy-display d-flex align-items-center"></div>
          </div>
          <div class="progress mb-4">
            <div class="progress-bar bg-info"></div>
          </div>
          <div class="symbol-card mb-4" id="q-box">
            <button class="reload-quiz-btn" onclick="app.renderQuiz(true)">↻</button>
            <div id="emoji-c">${this.getProgressEmoji(correctWord, false, 'quiz')}</div>
            <div id="feedback" class="feedback-area"></div>
          </div>
          <div class="options" id="opts"></div>
        </div>
      </div>`;

    this.renderStatus(document.querySelector(".quiz-container"));
    
    const questionBox = document.getElementById("q-box");
    const questionWrapper = document.createElement("div");

    if (showSvgAsQuestion) {
      this.renderToElement(correctWord, activeStyle, questionWrapper); 
    } else {
      questionWrapper.innerHTML = `<h1 class="display-1 fw-bold">${correctWord}</h1>`; 
    }

    questionBox.prepend(questionWrapper);
    this.renderOptions(correctWord, showSvgAsQuestion, activeStyle);
    this.startHintTimer(correctWord);
  }

  renderOptions(correctWord, questionWasSvg, activeStyle) {
    const optionsContainer = document.getElementById("opts");
    
    let unfinishedSymbols = this.currentLesson.symbols.filter(s => this.stats[s].c < 3);
    (this.currentLesson.practiceModeItems||[]).forEach(itm => {
        if (unfinishedSymbols.length < this.opts.learningWindow && itm != correctWord) unfinishedSymbols.push(itm);
    });
    const windowPool = unfinishedSymbols.slice(0, this.opts.learningWindow);
    
    const windowDistractors = windowPool
      .filter(s => s !== correctWord)
      .sort(() => 0.5 - Math.random())
      .slice(0, 2);
    
    const fullPool = this.currentLesson.symbols
      .filter(s => s !== correctWord && !windowDistractors.includes(s))
      .sort(() => 0.5 - Math.random());
    
    const globalDistractor = fullPool.length > 0 ? [fullPool[0]] : [];
    
    let selectedOptions = [correctWord, ...windowDistractors, ...globalDistractor];
    if (selectedOptions.length < 4) {
      const remaining = this.currentLesson.symbols
        .filter(s => !selectedOptions.includes(s))
        .sort(() => 0.5 - Math.random());
      selectedOptions = [...selectedOptions, ...remaining.slice(0, 4 - selectedOptions.length)];
    }

    selectedOptions.sort(() => 0.5 - Math.random());

    selectedOptions.forEach(option => {
      const button = document.createElement("button"); 
      button.className = "btn"; 
      button.dataset.word = option;
      
      const wrapper = document.createElement("div");
      if (questionWasSvg) {
        wrapper.textContent = option; 
      } else {
        this.renderToElement(option, activeStyle, wrapper, true);
      }
      
      button.appendChild(wrapper);
      button.onclick = () => {
        this.clearHintTimer(); 
        const isCorrect = option === correctWord; 
        this.playTone(isCorrect ? 'success' : 'error');
        
        let animations = { total: true };
        let isMilestone = false;
        
        if ((this.currentLesson.practiceModeItems||[]).includes(correctWord)){
          // Remove from list of words to test
          if (isCorrect || Math.random() < .5) {
            this.currentLesson.practiceModeItems = this.currentLesson.practiceModeItems.filter(itm => itm != correctWord);
          }
        }

        if (isCorrect) {
            const prevCorrectCount = this.stats[correctWord].c; 
            this.stats[correctWord].c++;
            
            let triggerAnimation = false;
            if (prevCorrectCount === 1) { 
              this.stats._score += 20; 
              animations.plant = true; 
              triggerAnimation = true;
            }
            else if (prevCorrectCount === 2) { 
              this.stats._score += 100; 
              animations.sunflower = true; 
              triggerAnimation = true;
              isMilestone = true;
              if (this.currentEnergy < 5) this.currentEnergy++; 
            } else {
              this.stats._score += 10;
              animations.drop = true;
              triggerAnimation = true;
            }
            
            this.syncScore();
            
            document.getElementById("emoji-c").innerHTML = this.getProgressEmoji(correctWord, triggerAnimation, 'quiz');
        } else { 
            this.stats[correctWord].w++; 
            this.stats._score = Math.max(0, this.stats._score - 1); 
            this.currentEnergy--; 
            this.triggerHeartLossAnimation(); 
        }

        localStorage.setItem('qatt_stats', JSON.stringify(this.stats)); 
        this.renderStatus(document.querySelector(".quiz-container"));
        
        document.querySelectorAll("#opts .btn").forEach(btn => { 
          btn.disabled = true; 
          if (btn.dataset.word === correctWord) {
            btn.style.backgroundColor = "#82e99e";
            btn.style.borderColor = "#4ade80";
          } else if (btn.dataset.word === option) {
            btn.style.backgroundColor = "#ff8e8e";
            btn.style.borderColor = "#f87171";
          }
        });

        const feedbackArea = document.getElementById("feedback"); 
        let feedbackHtml = `<h2 class="fw-bold" style="color:${isCorrect ? '#82e99e' : '#ff8e8e'}">
            ${isCorrect ? 'Đúng! ✨' : 'Sai 😅'}
          </h2>`;
        
        if (isMilestone) {
          feedbackHtml += `<div class="plus-one-heart">+1 ❤️</div>`;
        }

        feedbackArea.innerHTML = feedbackHtml;
        feedbackArea.classList.add("float-up-fade");
        
        setTimeout(() => this.renderQuiz(true), isMilestone ? 1800 : 1200);
      };
      optionsContainer.appendChild(button);
    });
  }
      // --- HELPERS ---
  async syncScore() {
  	if (!this.db.user) return; // Wait, until Auth is ready 
  	await this.db.saveScore(this.username || "Anonymous", this.stats._score || 0, 0);
  }
  
  updateGlobalCounters(animations = {}) {
    let counts = { drop: 0, plant: 0, sunflower: 0 };
    Object.keys(this.stats).forEach(key => { 
      if (key === '_score') return; 
      const symbolStats = this.stats[key]; 
      if (symbolStats.c >= 3) counts.sunflower++; 
      else if (symbolStats.c === 2) counts.plant++; 
      else if (symbolStats.c === 1) counts.drop++; 
    });

    this.updateBadge('total', Math.floor(this.stats._score || 0), animations.total);
    this.updateBadge('sunflower', counts.sunflower, animations.sunflower);
    this.updateBadge('plant', counts.plant, animations.plant);
    this.updateBadge('drop', counts.drop, animations.drop);
  }

  updateBadge(id, value, shouldAnimate) { 
    const valueEl = document.getElementById(`val-${id}`); 
    const badgeEl = document.getElementById(`badge-${id}`); 
    if (valueEl) valueEl.textContent = value; 
    if (shouldAnimate && badgeEl) { 
      badgeEl.classList.add('pop'); 
      setTimeout(() => badgeEl.classList.remove('pop'), 600); 
    } 
  }

  renderStatus(container) {
    if (!container) return; 
    const progressBar = container.querySelector(".progress-bar"); 
    const energyDisplay = container.querySelector(".energy-display");

    if (progressBar && this.currentLesson) {
      let doneCount = 0;
      let quizLength = 0;
      let afterFinishRemaining = (this.currentLesson.practiceModeItems||[]).length;
      if (afterFinishRemaining) {
        // Practice mode
        doneCount = this.currentLesson.quizLength - afterFinishRemaining;
        quizLength = this.currentLesson.quizLength;
      } else {
        // Learning mode, in learning mode quiz length is calculated dynamically
        doneCount = 65 * this.currentLesson.symbols.filter(symbol => this.stats[symbol].c >= 3).length;
        doneCount += 25 * this.currentLesson.symbols.filter(symbol => this.stats[symbol].c >= 2).length;
        doneCount += 10 * this.currentLesson.symbols.filter(symbol => this.stats[symbol].c >= 1).length;
        quizLength = 100 * this.currentLesson.symbols.length;
      }
      const percentage = Math.round((doneCount / quizLength) * 100);
      progressBar.style.width = `${percentage}%`;
    }

    if (energyDisplay) {
      
      let heartsHtml = `
        
      `; 
      for (let i = 0; i < 5; i++) {
        heartsHtml += `<span class="energy-heart ${i >= this.currentEnergy ? 'lost' : ''}">❤️</span>`; 
      }
      energyDisplay.innerHTML = heartsHtml + `
        <div class="ms-2 timer-wrapper">
          <div id="timer-pie" class="timer-pie timer-active"></div>
        </div>
        `; 
    }
    this.updateGlobalCounters();
  }

  triggerHeartLossAnimation() {
    const energyDisplay = document.querySelector(".energy-display");
    if (!energyDisplay) return;

    const hearts = energyDisplay.querySelectorAll(".energy-heart:not(.lost)");
    const targetHeart = hearts.length > 0 ? hearts[hearts.length - 1] : energyDisplay;
    
    const rect = targetHeart.getBoundingClientRect();
    const flyHeart = document.createElement("div");
    flyHeart.className = "heart-fly-loss";
    flyHeart.textContent = "❤️";
    
    flyHeart.style.left = (rect.left + rect.width / 2) + "px";
    flyHeart.style.top = rect.top + "px";
    flyHeart.style.position = "fixed"; 
    
    document.body.appendChild(flyHeart);
    setTimeout(() => flyHeart.remove(), 1100);
    this.playTone('error');
  }

  getLessonProgress(lessonId) {
    const lesson = this.lessons[lessonId]; 
    if (!lesson) return 0; 
    const finishedCount = lesson.symbols.filter(symbol => this.stats[symbol].c >= 3).length;
    return Math.round((finishedCount / lesson.symbols.length) * 100); 
  }
  
  getActiveStyle(lesson) {
    const userStyle = this.globalStyle === "auto" ? "-1" : this.globalStyle;
    if (lesson.style && lesson.style.length > 0) {
      if (lesson.style.includes(userStyle)) return userStyle;
      return String(lesson.style[0]);
    }
    return userStyle;
  }
  
  getParsedCode(word, style) { 
    const parsed = this.parser.parse(word); 
    if (!parsed) return null; 
    let code = parsed.code; 
    if (style === "-1") {
        if (!code.includes("+")) {
            code = code.replace(",", ",+");
        }
    } else {
        code = code.replace("+", "");
    }
    return code; 
  }
  
  renderToElement(word, style, element, skipReference = false) {
    element.innerHTML = "";
    const mainCode = this.getParsedCode(word, style);
    if (mainCode) {
        const mainSvgSpan = document.createElement("span");
        const formattedCode = style == "0" ? mainCode.replace(",", ",+") : mainCode.replace("+", "");
        this.renderer.renderText(formattedCode, mainSvgSpan, Math.max(0, parseInt(style)));
        element.appendChild(mainSvgSpan);

        if (!skipReference) {
            const refCode = this.getParsedCode(word, "0");
            const refSpan = document.createElement("span");
            refSpan.className = "reference-svg-container";
            const formattedRefCode = Number(style) > 0 ? refCode.replace(",", ",+") : refCode.replace("+", "");
            this.renderer.renderText(formattedRefCode, refSpan, Number(style) > 0 ? 0 : 1);
            element.appendChild(refSpan);
        }
    } else {
        element.textContent = word;
    }
  }

  getProgressEmoji(word, shouldAnimate, locationType) { 
    const correctCount = this.stats[word].c; 
    const emoji = correctCount === 1 ? "💧" : correctCount === 2 ? "🌱" : correctCount >= 3 ? "🌻" : ""; 
    const positionClass = locationType === 'quiz' ? 'quiz-pos' : 'grid-pos';
    const emptyClass = correctCount === 0 ? 'emoji-empty' : '';
    
    let animationClass = '';
    if (shouldAnimate && correctCount > 0) {
      animationClass = (correctCount >= 3) ? 'sunflower-milestone' : 'symbol-animate';
    }
    
    return `<span class="word-progress-emoji ${positionClass} ${animationClass} ${emptyClass}">${emoji}</span>`; 
  }
    startHintTimer(word) { 
    this.clearHintTimer(); 
    this.hintInterval = setInterval(() => { 
      const correctBtn = document.querySelector(`.options .btn[data-word="${word}"]`); 
      if (correctBtn) { 
        correctBtn.classList.add('hint-shake'); 
        setTimeout(() => correctBtn.classList.remove('hint-shake'), 800); 
        this.currentEnergy--; 
        this.triggerHeartLossAnimation(); 
        this.renderStatus(document.querySelector(".quiz-container")); 
        if (this.currentEnergy <= 0) this.renderQuiz(true); 
      } 
    }, 10000); 
  }

  clearHintTimer() { 
    if (this.hintInterval) clearInterval(this.hintInterval); 
  }

  setupStyleSelector() { 
    const selector = document.getElementById("global-style-select"); 
    Array.from(selector.options).forEach(opt => {
      if (opt.value == this.globalStyle) opt.selected = true;
    });
    selector.onchange = (event) => { 
      this.globalStyle = event.target.value; 
      localStorage.setItem('qattType', this.globalStyle); 
      this.refreshCurrentView();
    }; 
  }

  setupAudio() { 
    window.addEventListener('click', () => { 
      if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
    }, { once: true }); 
  }

  playTone(toneType) { 
    if (!this.audioCtx) return; 
    const oscillator = this.audioCtx.createOscillator(); 
    const gainNode = this.audioCtx.createGain(); 
    oscillator.connect(gainNode); 
    gainNode.connect(this.audioCtx.destination); 
    oscillator.frequency.setValueAtTime(toneType === 'success' ? 440 : 220, this.audioCtx.currentTime); 
    gainNode.gain.setValueAtTime(0.05, this.audioCtx.currentTime); 
    oscillator.start(); 
    oscillator.stop(this.audioCtx.currentTime + 0.2); 
  }

  setupNavigation() { 
    window.onpopstate = (event) => { 
      const state = event.state || { view: 'library' }; 
      if (state.view === 'library') this.renderLibrary(true); 
      else if (state.view === 'preview') this.renderLessonPreview(state.lessonId, true); 
    }; 
  }
  
  addLesson(options) {
    const lesson = { id: "", name: "", symbols: [], category: "", style: [], ...options };
    this.lessons[lesson.id] = lesson;
    if (!this.categories.includes(lesson.category)) {
      this.categories.push(lesson.category);
    }
    lesson.symbols.forEach(symbol => { 
      if (!this.stats[symbol]) this.stats[symbol] = { c: 0, w: 0 }; 
    });
  }

  startLessonDirectly() { 
    this.currentEnergy = 5;
    const lesson = JSON.parse(JSON.stringify(this.currentLesson));
    let unfinishedSymbols = lesson.symbols.filter(symbol => this.stats[symbol].c < 3);
    if (unfinishedSymbols.length == 0) {
      lesson.isFinished = true;
      lesson.practiceModeItems = JSON.parse(JSON.stringify(lesson.symbols));
      lesson.quizLength = lesson.practiceModeItems.length;
    } else lesson.quizLength = unfinishedSymbols.length;
    this.currentLesson = lesson;
    this.renderQuiz(); 
  }

  renderFullView(isPop = false) {
    if (!isPop) history.pushState({ view: 'full' }, '');
    this.bottomBar.style.display = "none";
    this.mainContainer.innerHTML = `
      <div class="fade-in">
        <button class="btn btn-link text-white-50 text-decoration-none mb-3 p-0" onclick="app.renderLibrary()">
          ← Quay lại
        </button>
        <div id="full-grid"></div>
      </div>`;

    const fullGrid = document.getElementById("full-grid");
    Object.values(this.lessons).forEach(lesson => {
      const lessonDiv = document.createElement("div"); 
      lessonDiv.className = `lesson-${lesson.id} mb-4 p-3 card`;
      lessonDiv.innerHTML = `
        <h6 class="fw-bold opacity-50 mb-3">${lesson.name}</h6>
        <div class="row g-2" id="grid-${lesson.id}"></div>`;
      
      lesson.symbols.forEach(word => {
        const column = document.createElement("div"); 
        column.className = "col-4 col-sm-2";
        const card = document.createElement("div"); 
        card.className = "word-grid-item";
        
        this.renderToElement(word, this.getActiveStyle(lesson), card);
        card.innerHTML += this.getProgressEmoji(word, false, 'grid');
        lessonDiv.querySelector(`#grid-${lesson.id}`).appendChild(column).appendChild(card);
      });
      fullGrid.appendChild(lessonDiv);
    });
  }
  
renderLeaderboard(isPop = false) {
  if (!isPop) history.pushState({ view: 'leaderboard' }, '');
  this.bottomBar.style.display = "none";
  this.mainContainer.innerHTML = `
    <div class="fade-in">
      <h4 class="fw-bold mb-4 text-center">Bảng xếp hạng</h4>
      <div id="leaderboard-content" class="card p-4 text-center">⏳</div>
    </div>`;
  
  let html = "";
  this.db.getHybridLeaderboard(10, 3).then(data => {
    html = "";
    let rankBefore = 0;
    data.forEach((row, i) => {
      const hasGap = row.rank - rankBefore > 1 ? true : false;
      rankBefore = row.rank;
      let username = row.username != "Anonymous" ? row.username : "Anonymous-" + row.user_id.split("-")[0].toUpperCase();
		if (username.length > 30) username = username.substr(0, 30);
		username = username.replace(/[^\p{L}\p{N}\s]/ug, "").replace(/[<>"'&]/g, "");
      if (hasGap) {
        html += `
          <tr><td colspan="3">...</td></tr>
        `;
      }
      	html += `
    	<tr style="${row.user_id == this.db.user.id ? '' : 'opacity:.85'}">
    		<td>
    		  (${row.rank})
    		</td>
    		<td class="fw-bold" style="font-size:1.1em">
      			${row.score}
      			${row.rank == 1 ? '🏆' : ''}
    		</td>
    		<th class="${row.user_id == this.db.user.id ? 'text-warning' : ''}">
    	  		${username}
      			<div class="small text-muted">
        			${new Date(row.updated_at||null).toISOString().replace('T', ' ').split('.')[0].slice(0, -3)}
      			</div>
    		</th>
    	</tr>
      	`;
    });
    this.mainContainer.innerHTML = `
    	
    <div class="m-2">
      Tên của bạn: <b>${this.username}</b> (<span onclick="app.setNickname()" class="text-light cursor-pointer">đổi tên</span>)
    </div>
    
    <table class="table rounded">
    		<tr>
    			<th>Rank</th>
    			<th>Score</th>
    			<th>Username</th>
    		</tr>
    		${html}
    	</table>`;
  });
}
  
  setNickname() {
    let newname = prompt('Chọn tên mới', localStorage.username || this.username);
	console.log("about to change username to", newname);
	if (!newname) return;
	  console.log("changing...");
	  newname = newname.trim().replace(/[^\p{L}\p{N}]/ug, "").replace(/[\x00-\x1F\x7F&<>"']/g, "").replace(/\s+/g, " ");
	  console.log("cleaned name", newname);
	  if (newname.length < 2) return;
	  if (newname.length > 30) newname = newname.substr(0, 30);
	  console.log("truncating to", newname);
	this.username = newname;
	localStorage.username = newname;
	console.log("username changed to", localStorage.username);
    setTimeout(() => this.refreshCurrentView(),1000);
	this.db.setNickname(newname);
  }
	
	
}
