<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://qtng.github.io/">
    <title>QATT IME Editor</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Nom Webfonts -->
    <link href="https://chunom.org/media/css/fonts/all.css" rel="stylesheet">
    
    <style>
        /* Grundstyling für QATT Glyphen */
        tt, #output svg, .qatt-btn svg {
            height: 3em;
            vertical-align: middle;
            stroke: currentColor;
            stroke-width: 5px;
            stroke-linecap: square;
            stroke-linejoin: square;
            fill: none;
            display: inline-block;
            min-width: 3em;
        }
        
        #output {
            min-height: 120px;
            background-color: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2px 0px;
            align-items: center;
            cursor: text;
        }

        #output svg {
            position: relative;
            top: -.2em;
        }

        #output .is-triplet nobr {
            align-items: center;
            white-space: wrap;
            display: flex;
            flex-direction: column-reverse;
        }

        #output .is-triplet nobr svg {
            height: 1.75em;
            position: relative;
            top: -.3em;
        }

        #output .is-triplet nobr svg:last-child {
            position: relative;
            top: .25em;
            height: 1.35em;
            width: 3em;
            stroke-width: 7px;
        }

        /* IME Highlight für das aktive Zeichen (Cursor) */
        .qatt-active {
            border-bottom: 2px solid #0d6efd;
            background-color: rgba(13, 110, 253, 0.1);
            border-radius: 4px 4px 0 0;
            padding: 0;
            min-width: 3em;
            min-height: 3em;
        }

        .qatt-active svg use { stroke: #aef; }
        .qatt-active div { display: none !important; }

        /* Cursor-Style für interaktive Zeichen im Output */
        #output tt {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #output tt:hover:not(.qatt-active) {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .qatt-btn {
            position: relative;
            width: 50px;
            height: 54px;
        }

        .qatt-btn-space {
            flex-grow: 1;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .qatt-btn-backspace, .qatt-btn-return {
            width: 50px;
            font-weight: bold;
        }

        .qatt-btn tt + tt {
            position: absolute;
            font-size: 0.7em;
            top: 2px;
            right: 2px;
            opacity: 0.5;
        }

        /* Helper to force line break in flex container */
        .line-break {
            width: 100%;
            height: 0;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="bg-dark text-light">

    <div class="container py-5">
        <header class="mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
            <h1 class="display-5 mb-0">QATT IME Editor</h1>
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <label for="fontSizeSlider" class="form-label mb-0 small text-secondary">Size</label>
                    <input type="range" class="form-range" id="fontSizeSlider" min="10" max="60" step="1" style="width: 100px;">
                </div>
                <button id="clearBtn" class="btn btn-sm btn-outline-danger">
                    Clear
                </button>
            </div>
        </header>

        <!-- Ausgabe-Bereich -->
        <div id="output" class="shadow-sm"></div>

        <!-- Tastatur Grid -->
        <div class="d-flex flex-wrap gap-1 justify-content-center mb-4" id="keyboard"></div>
    </div>

    <!-- Renderer Script -->
    <script src="qatt-dc/js/renderer.js?1"></script>
    
    <script>
        class QattIme {
            constructor(config) {
                this.initials = config.initials;
                this.vowelMap = config.vowelMap;
                
                this.output = document.getElementById('output');
                this.keyboard = document.getElementById('keyboard');
                this.clearBtn = document.getElementById('clearBtn');
                this.fontSizeSlider = document.getElementById('fontSizeSlider');
                
                // qattType is fixed to "0"
                this.currentType = "0";
                this.currentFontSize = localStorage.qattFontSize || "24";
                
                this.init();
            }

            init() {
                // Initialize Renderer
                this.renderer = new SvgGlyphRenderer();
                this.renderer.observe('TT');

                // Bind UI Events
                this.clearBtn.onclick = () => this.resetEditor();
                this.output.onclick = (e) => this.handleOutputAreaClick(e);
                this.fontSizeSlider.oninput = (e) => this.updateFontSize(e.target.value);
                document.addEventListener('keydown', (e) => this.handlePhysicalKeyboard(e));

                // Set initial values
                this.fontSizeSlider.value = this.currentFontSize;
                this.updateFontSize(this.currentFontSize);

                this.createKeyboard();
                this.createPlaceholder();
            }

            updateFontSize(size) {
                this.output.style.fontSize = size + "px";
                localStorage.qattFontSize = size;
            }

            createKeyboard() {
                this.keyboard.innerHTML = "";
                
                // Letter buttons
                this.initials.forEach(rawInitial => {
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-secondary qatt-btn d-flex align-items-center justify-content-center shadow-sm p-0';
                    
                    if (!rawInitial.startsWith("#")) {
                        const labelTt = document.createElement('tt');
                        labelTt.innerText = rawInitial + ",";
                        labelTt.dataset.type = this.currentType;
                        btn.appendChild(labelTt);
                    } else {
                        btn.textContent = rawInitial.substring(1);
                        btn.classList.add('fw-bold');
                    }

                    btn.onclick = (e) => {
                        e.stopPropagation();
                        this.handleKeyPress(rawInitial);
                    };
                    this.keyboard.appendChild(btn);
                });

                // Row break before function buttons
                const spacer = document.createElement('div');
                spacer.className = 'w-100 mt-1';
                this.keyboard.appendChild(spacer);

                // Backspace
                const backspaceBtn = document.createElement('button');
                backspaceBtn.className = 'btn btn-outline-warning qatt-btn qatt-btn-backspace shadow-sm';
                backspaceBtn.innerHTML = '⌫';
                backspaceBtn.onclick = (e) => {
                    e.stopPropagation();
                    this.handleBackspace();
                };
                this.keyboard.appendChild(backspaceBtn);

                // Space
                const spaceBtn = document.createElement('button');
                spaceBtn.className = 'btn btn-primary qatt-btn qatt-btn-space shadow-sm';
                spaceBtn.textContent = 'Space';
                spaceBtn.onclick = (e) => {
                    e.stopPropagation();
                    this.handleSpace();
                };
                this.keyboard.appendChild(spaceBtn);

                // Return
                const returnBtn = document.createElement('button');
                returnBtn.className = 'btn btn-outline-info qatt-btn qatt-btn-return shadow-sm';
                returnBtn.innerHTML = '↵';
                returnBtn.onclick = (e) => {
                    e.stopPropagation();
                    this.handleReturn();
                };
                this.keyboard.appendChild(returnBtn);
            }

            createPlaceholder(afterElement = null) {
                const tt = document.createElement('tt');
                tt.className = 'qatt-active';
                tt.dataset.type = this.currentType;
                tt.dataset.qattCode = "";
                tt.innerText = "?";
                tt.onclick = (e) => { 
                    e.stopPropagation();
                    this.setActive(tt); 
                };
                
                if (afterElement && afterElement.nextSibling) {
                    this.output.insertBefore(tt, afterElement.nextSibling);
                } else {
                    this.output.appendChild(tt);
                }
                return tt;
            }

            setActive(el) {
                const currentActive = this.output.querySelector('.qatt-active');
                if (currentActive && currentActive !== el) {
                    if (currentActive.dataset.qattCode && currentActive.dataset.qattCode !== "") {
                        currentActive.dataset.complete = "true";
                        currentActive.classList.remove('qatt-active');
                    } else {
                        currentActive.remove();
                    }
                }
                el.classList.add('qatt-active');
            }

            formatQattCode(code, previous) {
                if (!previous || previous === "") {
                    if (code.startsWith("#")) return "";
                    return code + ",";
                }

                const parts = previous.split(",");
                const startmark = 1;
                parts[3] = Number(parts[3] || 9);
                const p = parts[3];

                if (code == "#1") {
                    parts[3] = p === 1 ? 5 : 1;
                } else if (code == "#2") {
                    parts[3] = p === 6 ? 7 : 6;
                } else if (code == "#3") {
                    parts[3] = p === 0 ? 2 : 0;
                } else if (code == "#4") {
                    parts[3] = p === 3 ? 4 : 3;
                } else if (code == "#–") {
                    const hasMark = parts[0].startsWith("w");
                    parts[0] = (hasMark ? "" : "w") + parts[0].replace("w", "");
                } else if (code == "#+") {
                    parts[2] = !parts[2] ? "i" : parts[2] == "i" ? "u" : null;
                } else if (parts[1]) {
                    if (parts[1] != code && parts[1].replace(/\d/, "") == code) {
                        let num = Number(parts[1].slice(-1)) + 1;
                        if (num > 6) num = ''; 
                        parts[1] = code + num;
                    } else {
                        parts[1] = code + (parts[1] == code ? startmark : '');
                    }
                } else {
                    parts[1] = code;
                }
                
                parts[1] = parts[1] ?? "";
                parts[2] = parts[2] ?? "";
                parts[3] = parts[3] ?? "";
                
                let result = parts.slice(0, 4).join(",").replace(/[,9]+$/, '');
                if (result.indexOf(",") == -1) result += ",";
                
                return result;
            }

            handleKeyPress(rawInitial) {
                let activeChar = this.output.querySelector('.qatt-active');
                if (!activeChar) activeChar = this.createPlaceholder();

                let prevCode = activeChar.dataset.qattCode || "";
                if (activeChar.dataset.complete === "true") {
                    prevCode = "";
                    delete activeChar.dataset.complete;
                    activeChar.dataset.type = this.currentType;
                }

                const syllableCode = this.formatQattCode(rawInitial, prevCode);
                
                if (syllableCode !== "") {
                    activeChar.dataset.qattCode = syllableCode;
                    activeChar.innerText = syllableCode;
                    if (syllableCode.match(/^[^,]+,[^,]+,[^,]/)) {
                        activeChar.classList.add("is-triplet");
                    } else {
                        activeChar.classList.remove("is-triplet");
                    }
                    
                    const parent = activeChar.parentNode;
                    const next = activeChar.nextSibling;
                    parent.removeChild(activeChar);
                    parent.insertBefore(activeChar, next);
                }
            }

            handleSpace() {
                const activeChar = this.output.querySelector('.qatt-active');
                if (activeChar && activeChar.dataset.qattCode && activeChar.dataset.qattCode !== "") {
                    activeChar.classList.remove('qatt-active');
                    activeChar.dataset.complete = "true";
                    this.createPlaceholder(activeChar);
                }
            }

            handleReturn() {
                const activeChar = this.output.querySelector('.qatt-active');
                if (activeChar) {
                    const hasContent = activeChar.dataset.qattCode && activeChar.dataset.qattCode !== "";
                    
                    if (hasContent) {
                        // Accept current character
                        activeChar.classList.remove('qatt-active');
                        activeChar.dataset.complete = "true";
                    } else {
                        // If empty, remove placeholder
                        activeChar.remove();
                    }
                    
                    // Insert line break
                    const br = document.createElement('div');
                    br.className = 'line-break';
                    this.output.appendChild(br);
                    
                    // Create new placeholder on the next line
                    this.createPlaceholder();
                }
            }

            handleBackspace() {
                const activeChar = this.output.querySelector('.qatt-active');
                if (!activeChar) return;

                if (activeChar.dataset.qattCode && activeChar.dataset.qattCode !== "") {
                    activeChar.dataset.qattCode = "";
                    activeChar.innerText = "?";
                    const parent = activeChar.parentNode;
                    const next = activeChar.nextSibling;
                    parent.removeChild(activeChar);
                    parent.insertBefore(activeChar, next);
                } else {
                    const prev = activeChar.previousElementSibling;
                    if (prev) {
                        prev.remove();
                    }
                }
            }

            handleOutputAreaClick(e) {
                if (e.target === this.output) {
                    const lastChild = this.output.lastElementChild;
                    if (lastChild && lastChild.classList.contains('qatt-active') && lastChild.dataset.qattCode === "") {
                        return;
                    }
                    const newPlaceholder = this.createPlaceholder();
                    this.setActive(newPlaceholder);
                }
            }

            handlePhysicalKeyboard(e) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    this.handleSpace();
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    this.handleBackspace();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    this.handleReturn();
                }
            }

            resetEditor() {
                this.output.innerHTML = '';
                this.createPlaceholder();
            }
        }

        const config = {
            initials: "ng tr m r nh #– #+ g n v kh dz #4 #1 c t ph x ch #3 #2 h d b s th l _".split(" "),
            vowelMap: {
                dz: "aw", ch: "e2", th: "i2", nh: "o2",
                r: "a", s: "e", d: "i", tr: "o", n: ",ng", t: ",c",
                kh: "aw2", x: "a2", h: "u", g: "u2", ng: ",n", c: ",t",
                l: "y", _: "y2", v: ",u", ph: ",i", b: ",m", m: ",p",
            }
        };

        window.onload = () => {
            new QattIme(config);
        };
    </script>
</body>
</html>
