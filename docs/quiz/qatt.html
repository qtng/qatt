  <style type="text/css">
	:root {
 		--stroke-width: 6px;
 		--svg-height: 2.5em;
 		--bgcolor: bisque;
 		--fgcolor-raw: 0, 0, 0;
 		--fgcolor: black;
 		--fgcolor-inverse: black;
 		
 		--highlight-onsets: #f87171;
 		--highlight-vowels: #60a5fa;
 		--highlight-tones: #0b0;
 		--highlight-rhymes: #08b;
 		--highlight-codas: #e00;
  	}
  		.style-selector-wrap,
  		.reference-svg-container {display:none}
  		.back-link {color: var(--fgcolor)!important}
  		#quiz-navbar {
  			padding-top: 16px!important;
  			background: rgba(var(--fgcolor-raw),0.4)
  		}
  		body {
  			background: var(--bgcolor);
  			color: var(--fgcolor);
  		}
  		.card {
  			background: rgba(255,255,255,.05);
  			color: var(--fgcolor)
  		}
  		.symbol-card, .word-grid-item, .lesson-thumbnail  {
  			background: rgba(0,0,0,.1);
  			color: var(--fgcolor-inverse)
  		}
  		
  		.progress {background: rgba(255,255,255,.7)}
  
		nobr:has(svg:nth-child(2)) {
        	display: inline-flex;
        	flex-direction: column-reverse;
        	align-items: center;
        	
        	svg:last-child {
        		height: calc(0.4 * var(--svg-height))!important;
        		width: calc(0.7 * var(--svg-height))!important;
        		border: none!important;
        		position: relative!important;
        		bottom: calc(-0.1 * var(--svg-height))!important;
        		top: .35em!important;
        		margin-bottom: 0!important;
        		use {
        		    stroke-width: calc(1.4 * var(--stroke-width));
        		}
        	}
        	svg:first-child {
        		position: relative!important;
        		height: calc(0.7 * var(--svg-height))!important;
        		width: calc(0.8 * var(--svg-height))!important;
        		margin-top: 0!important;
        		use {
        			stroke-width: calc(1.2 * var(--stroke-width));
        		}
        		use[href^="#qt"] {
        			transform-origin: center;
        			transform: scale(1, 1.2);
        		}
        	}
        }

    /* !!! START OF PROTECTED CSS BLOCK !!! */
    .lesson-onsets :not(.reference-svg-container) > nobr > svg {
    	use[href$="small"], use[href$="large"] { stroke: var(--highlight-onsets) }
    	use[href^="#qt"] { display: none}
    	
    }
    .lesson-vowels :not(.reference-svg-container) > nobr > svg {
    	use[href$="a"], use[href$="#e"], use[href$="-e"], use[href$="i"], use[href$="o"], use[href$="u"], use[href$="y"], use[href$="w"], use[href$="2"] { stroke: var(--highlight-vowels) }
    }
	.lesson-tones :not(.reference-svg-container) > nobr > svg {
    	use[href^="#qt"], use[href*="tlarge"] { stroke: var(--highlight-tones) }
    }
    .lesson-codas :not(.reference-svg-container) > nobr > svg {
    	use[href$="medial"], use[href$="U"], use[href$="I"], use[href$="N"], use[href$="M"], use[href$="NG"], use[href$="NH"], use[href$="T"], use[href$="P"], use[href$="C"], use[href$="CH"] {
    		stroke: var(--highlight-codas)
    	}
    	use[href*="-_"], use[href*="-b"], use[href*="-c"], use[href*="-ch"], use[href*="-d"], use[href*="-dz"], use[href*="-g"], use[href*="-h"], use[href*="-kh"], use[href*="-l"], use[href*="-m"],
    	use[href*="-n"], use[href$="-ng"], use[href*="-nh"], use[href*="-ph"], use[href*="-r"], use[href*="-s"], use[href*="-t"], use[href*="-th"], use[href*="-tr"], use[href*="-v"], use[href*="-x"] {
    		&[href$="1"], &[href$="2"], &[href$="3"], &[href$="4"], &[href$="5"], &[href$="6"]{
    			stroke: var(--highlight-codas)
    		};
    	};
    }
    .lesson-rhymes-1, .lesson-rhymes-2, .lesson-rhymes-3, .lesson-rhymes-4, .lesson-rhymes-5, .lesson-rhymes-6, .lesson-rhymes-7, .lesson-rhymes-8, .lesson-rhymes-9, .lesson-rhymes-10, .lesson-rhymes-11, .lesson-rhymes-12 {
    	:not(.reference-svg-container) > nobr > svg {
    		use[href$="-_"], use[href$="-b"], use[href$="-c"], use[href$="-ch"], use[href$="-d"], use[href$="-dz"], use[href$="-g"], use[href$="-h"], use[href$="-kh"], use[href$="-l"], use[href$="-m"], use[href$="-n"], use[href$="-ng"], use[href$="-nh"], use[href$="-ph"], use[href$="-r"], use[href$="-s"], use[href$="-t"], use[href$="-th"], use[href$="-tr"], use[href$="-v"], use[href$="-x"] { stroke: var(--highlight-rhymes); };
    		use[href*="-_"], use[href*="-b"], use[href*="-c"], use[href*="-ch"], use[href*="-d"], use[href*="-dz"], use[href*="-g"], use[href*="-h"], use[href*="-kh"], use[href*="-l"], use[href*="-m"], use[href*="-n"], use[href$="-ng"], use[href*="-nh"], use[href*="-ph"], use[href*="-r"], use[href*="-s"], use[href*="-t"], use[href*="-th"], use[href*="-tr"], use[href*="-v"], use[href*="-x"] {
    			&[href$="1"], &[href$="2"], &[href$="3"], &[href$="4"], &[href$="5"], &[href$="6"]{ stroke: var(--highlight-rhymes); };
    		};
    	}
	}
    /* !!! END OF PROTECTED CSS BLOCK !!! */
	  
  </style>
</head>
<body>
