  	:root {
 		--stroke-width: 6px;

  		.symbol-card, .word-grid-item, .lesson-thumbnail  {

		nobr:has(svg:nth-child(2)) {
        	display: inline-flex;

        	align-items: center;
        	
        	svg:last-child {
        		height: calc(0.4 * var(--svg-height))!important;

        		position: relative!important;
        		bottom: calc(-0.1 * var(--svg-height))!important;
        		top: .35em!important;
        		margin-bottom: 0!important;
        		use {
        		    stroke-width: calc(1.4 * var(--stroke-width));
        		}
        	}

        		position: relative!important;
        		height: calc(0.7 * var(--svg-height))!important;

        		margin-top: 0!important;
        		use {

        		}
        		use[href^="#qt"] {

        }

<body>
