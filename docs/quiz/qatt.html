<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>QATT App</title>
  <base href="https://qtng.github.io">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/qatt-dc/js/navigation.js"></script>
  <script src="/qatt-dc/js/renderer.js"></script>
  <script src="/qatt-dc/js/parser.js"></script>
  <script src="/qatt-dc/js/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/qatt-dc/quiz/quiz.css">
  <script src="/qatt-dc/quiz/quiz js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
async function main() {
const app = await App.init(document.getElementById("app"));
const basicStyles = ["-1", "1", "2"];
const onsets = "b c ch d đ g h kh l m n ng nh ph r s t th tr v x".split(" ");
const vowels = "ă â a ơ ê e i ia ô o u ua ư ưa".split(" ");
const tones = "a à á ả ã ạ".split(" ");
const codas = "ao ai an át am áp ang ác anh ách".split(" ");
const levelName = "Essentials";

app.addLesson({ id: "onsets", category: levelName, name: "Phụ âm đầu", style: basicStyles, symbols: ["a", ...onsets.map(o => o.trim() + "a").filter(o => o !== "a")] });
app.addLesson({ id: "vowels", category: levelName, name: "Nguyên âm", style: basicStyles, symbols: vowels });
app.addLesson({ id: "tones", category: levelName, name: "Thanh điệu", style: basicStyles, symbols: tones });
app.addLesson({ id: "codas", category: levelName, name: "Âm cuối", style: basicStyles, symbols: codas });

const rhymesList = [
    { words: "ai ay ơi ây ôi oi ui uôi ưi ươi" }, 
    { words: "ao au âu êu eo iu iêu ưu ươu" },
    { words: "an ăn ơn ân ên en in iên ôn on un uôn ưn ươn" }, 
    { words: "am ăm ơm âm êm em im iêm ôm om um uôm ưm ươm" },
    { words: "ang ăng anh âng ênh eng inh iêng ông ong ung uông ưng ương" },
];

const rhymesList2 = [
    { words: "oa uơ uê oe uy uya" }, 
    { words: "oai oay uơi uây oao oau uâu uêu oeo uyu uyêu" },
    { words: "oan oăn uơn uân uên oen uyn uyên" }, 
    { words: "oam oăm uơm uâm uêm oem uym uyêm" },
    { words: "oang oăng oanh uâng uênh oeng uynh uyêng" },
];

let rhymeIdx = 0;
rhymesList.forEach((rhyme) => { rhymeIdx++; app.addLesson({ id: "rhymes-" + rhymeIdx, category: "Advanced", name: "Vần " + rhymeIdx, style: ["0"], symbols: rhyme.words.split(" ") }); });
rhymesList2.forEach((rhyme) => { rhymeIdx++; app.addLesson({ id: "rhymes-" + rhymeIdx, category: "Master", name: "Vần " + rhymeIdx, style: ["0"], symbols: rhyme.words.split(" ") }); });

window.app = app;
app.renderLibrary();

}

main()
  </script>
</body>
</html>
