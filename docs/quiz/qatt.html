<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mini-QATT App</title>
  <base href="https://qtng.github.io">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/qatt-dc/js/navigation.js"></script>
  <script src="/qatt-dc/js/renderer.js"></script>
  <script src="/qatt-dc/js/parser.js"></script>
  <script src="/qatt-dc/js/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/qatt-dc/quiz/quiz.css">
  <script src="/qatt-dc/quiz/quiz.js"></script>
  <style type="text/css">
  
  	:root {
 		--stroke-width: 6px;
 		--svg-height: 2.5em;
  	}
  		.reference-svg-container {display:none}
  		#quiz-navbar {
  			padding-top: 16px!important;
  			xxbackground: rgba(0,0,0,0.4)
  		}
  		body, .card {
  			xxbackground: bisque;
  			xxcolor:black
  		}
  		.symbol-card, .word-grid-item, .lesson-thumbnail  {
  			xxbackground: beige;
  			xxcolor: black;
  		}
  
		nobr:has(svg:nth-child(2)) {
        	display: inline-flex;
        	flex-direction: column-reverse;
        	align-items: center;
        	
        	svg:last-child {
        		height: calc(0.4 * var(--svg-height))!important;
        		width: calc(0.7 * var(--svg-height))!important;
        		border: none!important;
        		position: relative!important;
        		bottom: calc(-0.1 * var(--svg-height))!important;
        		top: .35em!important;
        		margin-bottom: 0!important;
        		use {
        		    stroke-width: calc(1.4 * var(--stroke-width));
        		}
        	}
        	svg:first-child {
        		position: relative!important;
        		height: calc(0.7 * var(--svg-height))!important;
        		width: calc(0.8 * var(--svg-height))!important;
        		margin-top: 0!important;
        		use {
        			stroke-width: calc(1.2 * var(--stroke-width));
        		}
        		use[href^="#qt"] {
        			transform-origin: center;
        			transform: scale(1, 1.2);
        		}
        	}
        }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
async function main() {

const basicStyles = ["3"];

window.app = app;
app.renderLibrary();

}

main()
  </script>
</body>
</html>
